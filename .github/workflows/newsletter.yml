name: Weekly Newsletter

on:
  schedule:
    - cron: '0 17 * * 2'  # Every Tuesday at 9 AM PST (17:00 UTC)
  workflow_dispatch:        # Allow manual trigger from GitHub Actions tab

jobs:
  send-newsletter:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run newsletter agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NETLIFY_API_TOKEN: ${{ secrets.NETLIFY_API_TOKEN }}
          NETLIFY_FORM_ID: ${{ secrets.NETLIFY_FORM_ID }}
          NETLIFY_UNSUBSCRIBE_FORM_ID: ${{ secrets.NETLIFY_UNSUBSCRIBE_FORM_ID }}
          NEWSLETTER_FROM_EMAIL: ${{ secrets.NEWSLETTER_FROM_EMAIL }}
          NEWSLETTER_FROM_NAME: ${{ secrets.NEWSLETTER_FROM_NAME }}
          NEWSLETTER_BCC_EMAIL: ${{ secrets.NEWSLETTER_BCC_EMAIL }}
          UNSUBSCRIBE_BASE_URL: ${{ secrets.UNSUBSCRIBE_BASE_URL }}
        run: python main.py
